name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: |
            server/pnpm-lock.yaml
            client/pnpm-lock.yaml

      - name: Install server dependencies
        working-directory: ./server
        run: pnpm install

      - name: Install client dependencies
        working-directory: ./client
        run: pnpm install

      - name: Type check server
        working-directory: ./server
        run: pnpm exec tsc --noEmit

      - name: Type check client
        working-directory: ./client
        run: pnpm exec tsc --noEmit

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install client dependencies
        working-directory: ./client
        run: pnpm install

      - name: Build client
        working-directory: ./client
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8787' }}
